<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#080810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SHARKFLIX">
<title>SHARKFLIX</title>
<link rel="manifest" href="#" id="manifestLink">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--bg2:#0f0f1c;--bg3:#16162a;
  --red:#e63946;--red2:#c1121f;
  --blue:#2563eb;--blue2:#1d4ed8;
  --text:#f0ede8;--muted:#8a8799;
  --border:rgba(230,57,70,0.2);
  --card-radius:10px;--nav-h:64px
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:linear-gradient(to bottom,rgba(8,8,16,.98),rgba(8,8,16,.7));backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;background:linear-gradient(90deg,#e63946,#2563eb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;cursor:pointer}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-search{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:24px;padding:6px 14px;gap:8px;transition:.2s}
.nav-search:focus-within{border-color:var(--red)}
.nav-search input{background:none;border:none;outline:none;color:var(--text);font-size:14px;width:160px;font-family:'DM Sans',sans-serif}
.nav-search input::placeholder{color:var(--muted)}
.btn-import{display:flex;align-items:center;gap:7px;background:var(--red);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.15s}
.btn-import:hover{background:var(--red2)}
#fileInput{display:none}

/* HERO */
#hero{margin-top:var(--nav-h);position:relative;height:480px;overflow:hidden;display:flex;align-items:flex-end;background-size:cover;background-position:center top}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(8,8,16,.4) 60%,transparent 100%)}
.hero-content{position:relative;z-index:2;padding:0 32px 40px;max-width:600px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(230,57,70,.15);border:1px solid rgba(230,57,70,.35);border-radius:4px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--red);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,6vw,72px);line-height:.95;letter-spacing:1px;margin-bottom:14px;text-shadow:0 2px 20px rgba(0,0,0,.8)}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap}
.btn-play{display:flex;align-items:center;gap:8px;background:var(--red);color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.15s}
.btn-play:hover{background:var(--red2);transform:scale(1.02)}
.hero-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;opacity:.35;text-align:center;padding:20px}
.hero-empty h2{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px}
.hero-empty p{font-size:14px;color:var(--muted);line-height:1.6}

/* MAIN */
main{padding:0 0 100px}
.section{margin:40px 0 0}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:0 24px;margin-bottom:16px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px}
.section-count{font-size:12px;color:var(--muted);background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 8px}

/* GRID */
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;padding:0 24px}
.video-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-radius);overflow:hidden;cursor:pointer;transition:.2s;position:relative}
.video-card:hover{transform:translateY(-4px) scale(1.01);border-color:rgba(230,57,70,.5);box-shadow:0 16px 40px rgba(0,0,0,.6)}
.thumb-wrap{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,var(--bg3),#1e1e30);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.thumb-wrap video.thumb-vid{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;opacity:0;transition:opacity .3s}
.thumb-icon{font-size:32px;color:rgba(230,57,70,.25);position:relative;z-index:0}
.video-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;transition:.2s;z-index:2}
.video-card:hover .video-overlay{background:rgba(0,0,0,.4)}
.play-btn{width:52px;height:52px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.8);transition:.2s}
.play-btn svg{margin-left:3px}
.video-card:hover .play-btn{opacity:1;transform:scale(1)}
.video-info{padding:10px 12px}
.video-title{font-size:13px;font-weight:600;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.video-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.video-cat{font-size:11px;color:var(--red);background:rgba(230,57,70,.12);border-radius:3px;padding:2px 6px;font-weight:500}
.video-size{font-size:11px;color:var(--muted);margin-left:auto}
.card-del-btn{position:absolute;top:8px;right:8px;opacity:0;transition:.2s;z-index:5;background:rgba(0,0,0,.75);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;line-height:1}
.video-card:hover .card-del-btn{opacity:1}
@media(max-width:768px){.card-del-btn{opacity:1}}
.thumb-wrap.is-audio{background:linear-gradient(135deg,#0d1a2e,#1a0820)}
.badge-mp3{font-size:10px;color:#22d3ee;background:rgba(34,211,238,.1);border-radius:3px;padding:2px 6px;border:1px solid rgba(34,211,238,.2)}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* MODAL PLAYER */
.modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.95);align-items:center;justify-content:center;padding:16px}
.modal.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:980px;overflow:hidden;position:relative;max-height:95vh;display:flex;flex-direction:column}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:980px;overflow:visible;position:relative;max-height:95vh;display:flex;flex-direction:column;overflow-y:auto}
.modal-close{position:absolute;top:12px;right:12px;z-index:10;background:rgba(0,0,0,.7);border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;color:var(--text);font-size:20px;display:flex;align-items:center;justify-content:center;transition:.15s}
.modal-close:hover{background:var(--red);color:#fff}

/* VIDEO PLAYER */
.player-wrap{position:relative;width:100%;background:#000;aspect-ratio:16/9;flex-shrink:0}
#mainVideo{width:100%;height:100%;display:block;background:#000}
.player-wrap{position:relative;width:100%;background:#000;flex-shrink:0}
#mainVideo{width:100%;height:auto;max-height:60vh;display:block;background:#000}
.player-controls{padding:10px 20px;background:var(--bg3);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.player-nav-btn{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);border-radius:8px;padding:7px 14px;color:var(--text);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.15s;white-space:nowrap}
.player-nav-btn:hover:not(:disabled){border-color:var(--red);color:var(--red)}
.player-nav-btn:disabled{opacity:.3;cursor:not-allowed}
.autonext-toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer;user-select:none}
.toggle-sw{width:36px;height:20px;background:var(--bg);border:1px solid var(--border);border-radius:10px;position:relative;transition:.2s;flex-shrink:0}
.toggle-sw.on{background:var(--red);border-color:var(--red)}
.toggle-sw::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.2s}
.toggle-sw.on::after{left:18px}
.modal-info{padding:16px 24px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--muted)}
.progress-bar-wrap{width:100%;height:3px;background:rgba(255,255,255,.1);position:absolute;bottom:0;left:0;cursor:pointer}
.progress-bar{height:100%;background:var(--red);width:0%;transition:width .5s linear;pointer-events:none}

/* AUTONEXT OVERLAY */
.autonext-overlay{display:none;position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.95),transparent);padding:20px;z-index:5}
.autonext-overlay{display:none;padding:12px 20px;background:var(--bg3);border-top:1px solid var(--border)}
.autonext-overlay.show{display:block}
.autonext-bar{height:3px;background:rgba(255,255,255,.15);border-radius:2px;margin-bottom:10px;overflow:hidden}
.autonext-prog{height:100%;background:var(--red);border-radius:2px;width:0;transition:width 5s linear}
.autonext-info{display:flex;align-items:center;justify-content:space-between}
.autonext-txt{font-size:13px;color:var(--text)}
.autonext-cancel{background:none;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:5px 12px;color:var(--text);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* CATEGORY MODAL */
.cat-modal{display:none;position:fixed;inset:0;z-index:350;background:rgba(0,0,0,.92);align-items:center;justify-content:center;padding:16px}
.cat-modal.open{display:flex}
.cat-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:420px;padding:28px 32px;position:relative}
.cat-box h2{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;margin-bottom:6px}
.cat-box p{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px}
.cat-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.15s;text-align:left}
.cat-btn:hover{border-color:var(--red);color:var(--red)}
.cat-custom{display:flex;gap:8px;margin-top:4px}
.cat-custom input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:.2s}
.cat-custom input:focus{border-color:var(--red)}
.btn-confirm{background:var(--red);border:none;border-radius:8px;padding:9px 18px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn-confirm:hover{background:var(--red2)}

/* EMPTY STATE */
.empty-state{padding:60px 24px;text-align:center;grid-column:1/-1}
.empty-state .icon{font-size:48px;margin-bottom:14px;opacity:.3}
.empty-state h3{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
.empty-state p{font-size:14px;color:var(--muted);max-width:340px;margin:0 auto;line-height:1.6}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--red);border-radius:8px;padding:12px 20px;color:var(--text);font-size:14px;font-weight:500;z-index:600;transition:.3s;opacity:0;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.offline-badge{display:none;position:fixed;top:calc(var(--nav-h) + 8px);right:12px;background:rgba(230,57,70,.15);border:1px solid rgba(230,57,70,.4);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--red);font-weight:600;letter-spacing:.5px;z-index:99}
.offline-badge.show{display:block}

/* SEARCH SECTION */
#search-section{display:none}
#search-section.visible{display:block}

/* HAMBURGER MOBILE */
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;flex-direction:column;gap:5px;align-items:center;justify-content:center}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px}
.mobile-menu{display:none;position:fixed;top:var(--nav-h);left:0;right:0;background:var(--bg2);border-bottom:1px solid var(--border);z-index:99;padding:10px 16px;flex-direction:column;gap:8px}
.mobile-menu.open{display:flex}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(230,57,70,.3);border-radius:3px}

/* RESPONSIVE */
@media(max-width:768px){
  nav{padding:0 12px}
  .nav-search{display:none}
  .hamburger{display:flex}
  #hero{height:280px}
  .hero-content{padding:0 16px 20px}
  .section-header,.video-grid{padding:0 12px}
  .video-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .modal{padding:8px;align-items:flex-end}
  .modal-box{border-radius:16px 16px 0 0;max-height:95vh}
  .toast{white-space:normal;max-width:85vw;text-align:center}
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo" onclick="scrollTo(0,0)">SHARKFLIX</div>
  <div class="nav-right">
    <div class="nav-search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Rechercher..." oninput="handleSearch(this.value)">
    </div>
    <button class="btn-import" onclick="document.getElementById('fileInput').click()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span>Importer</span>
    </button>
    <button class="hamburger" onclick="document.getElementById('mobileMenu').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <button class="btn-import" style="width:100%;justify-content:center" onclick="document.getElementById('fileInput').click();document.getElementById('mobileMenu').classList.remove('open')">
    ＋ Importer des vidéos
  </button>
  <div style="display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;gap:8px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" placeholder="Rechercher..." oninput="handleSearch(this.value);document.getElementById('searchInput').value=this.value" style="background:none;border:none;outline:none;color:var(--text);font-size:14px;width:100%;font-family:'DM Sans',sans-serif">
  </div>
</div>

<input type="file" id="fileInput" accept="video/*,audio/*" multiple>
<input type="file" id="coverInput" accept="image/*" style="display:none">

<!-- HERO -->
<section id="hero">
  <div class="hero-overlay"></div>
  <div class="hero-content" id="heroContent">
    <div class="hero-empty">
      <div style="font-size:64px">🎬</div>
      <h2>AUCUNE VIDÉO</h2>
      <p>Clique sur <strong style="color:var(--red)">Importer</strong> pour ajouter tes vidéos depuis ton appareil</p>
    </div>
  </div>
</section>

<main id="mainContent">
  <!-- SEARCH RESULTS -->
  <div id="search-section">
    <div class="section-header"><span class="section-title" id="searchTitle">RÉSULTATS</span><span class="section-count" id="searchCount">0</span></div>
    <div class="video-grid" id="searchGrid"></div>
  </div>

  <!-- ALL VIDEOS -->
  <div class="section" id="all-section">
    <div class="section-header"><span class="section-title">TOUTES LES VIDÉOS</span><span class="section-count" id="allCount">0</span></div>
    <div class="video-grid" id="allGrid"></div>
  </div>

  <!-- CATEGORIES -->
  <div id="categoriesContainer"></div>
</main>

<!-- PLAYER MODAL -->
<div class="modal" id="playerModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closePlayer()">✕</button>
    <div class="player-wrap">
      <video id="mainVideo" controls playsinline webkit-playsinline preload="metadata" style="width:100%;height:100%;display:block;background:#000"></video>
      <div class="autonext-overlay" id="antOverlay">
        <div class="autonext-bar"><div class="autonext-prog" id="antProg"></div></div>
        <div class="autonext-info">
          <span class="autonext-txt" id="antTxt">Prochaine vidéo...</span>
          <button class="autonext-cancel" onclick="cancelAnt()">Annuler</button>
        </div>
    </div>
    <div class="autonext-overlay" id="antOverlay" style="position:relative;display:none;background:var(--bg3);border-top:1px solid var(--border);padding:12px 20px">
      <div class="autonext-bar" style="margin-bottom:8px"><div class="autonext-prog" id="antProg"></div></div>
      <div class="autonext-info">
        <span class="autonext-txt" id="antTxt">Prochaine vidéo...</span>
        <button class="autonext-cancel" onclick="cancelAnt()">Annuler</button>
      </div>
    </div>
    <div class="player-controls">
      <button class="player-nav-btn" id="prevBtn" onclick="playPrev()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> Précédente
      </button>
      <label class="autonext-toggle" onclick="toggleAutoNext()">
        <div class="toggle-sw on" id="antToggle"></div> Lecture auto
      </label>
      <button class="player-nav-btn" id="nextBtn" onclick="playNext()">
        Suivante <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="modal-info">
      <div class="modal-title" id="playerTitle"></div>
      <div class="modal-sub" id="playerSub"></div>
    </div>
  </div>
</div>

<!-- COVER IMAGE MODAL -->
<div class="cat-modal" id="coverModal">
  <div class="cat-box">
    <h2>IMAGE DE COUVERTURE</h2>
    <p id="coverModalSub">Choisis une image pour cette vidéo (optionnel)</p>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">
      <button class="cat-btn" style="text-align:center;padding:16px" onclick="pickCoverImage()">🖼️ Choisir une image depuis la galerie</button>
      <button class="cat-btn" style="text-align:center;padding:16px;color:var(--muted)" onclick="skipCover()">⏭ Passer (sans image)</button>
    </div>
    <div id="coverPreviewWrap" style="display:none;text-align:center">
      <img id="coverPreview" style="max-width:100%;max-height:160px;border-radius:8px;object-fit:cover;margin-bottom:12px">
      <div style="display:flex;gap:8px">
        <button class="cat-btn" style="flex:1;text-align:center" onclick="pickCoverImage()">Changer</button>
        <button class="btn-confirm" style="flex:1" onclick="confirmCover()">✓ Utiliser cette image</button>
      </div>
    </div>
  </div>
</div>

<!-- CATEGORY PICKER MODAL -->
<div class="cat-modal" id="catModal">
  <div class="cat-box">
    <h2>CATÉGORIE</h2>
    <p id="catModalSub">Choisis une catégorie pour cette vidéo</p>
    <div class="cat-grid">
      <button class="cat-btn" onclick="setCat('Films')">🎬 Films</button>
      <button class="cat-btn" onclick="setCat('Séries')">📺 Séries</button>
      <button class="cat-btn" onclick="setCat('Documentaires')">🎥 Documentaires</button>
      <button class="cat-btn" onclick="setCat('Musique')">🎵 Musique</button>
      <button class="cat-btn" onclick="setCat('Sport')">⚽ Sport</button>
      <button class="cat-btn" onclick="setCat('Autre')">📁 Autre</button>
    </div>
    <div class="cat-custom">
      <input type="text" id="catCustomInput" placeholder="Autre catégorie...">
      <button class="btn-confirm" onclick="setCatCustom()">OK</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="offline-badge" id="offlineBadge">✈ HORS LIGNE</div>

<script>
// ── STATE ──
let videos = [];       // {id, name, category, url, size}
let playQueue = [];
let playIdx = 0;
let autoNext = true;
let antTimer = null;
let currentId = null;
let catQueue = [];
let catQueueIdx = 0;
let idCounter = 0;

// ── INDEXEDDB ──
let db;
const DB_NAME = 'sharkflix';
const DB_VERSION = 1;
const STORE = 'videos';

function initDB(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains(STORE)){
        d.createObjectStore(STORE, {keyPath:'id', autoIncrement:true});
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(); };
    req.onerror = () => reject(req.error);
  });
}

function dbAdd(record){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE,'readwrite');
    const req = tx.objectStore(STORE).add(record);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbGetAll(){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE,'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbDelete(id){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE,'readwrite');
    const req = tx.objectStore(STORE).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function loadFromDB(){
  const rows = await dbGetAll();
  // Recréer les object URLs depuis les blobs stockés
  videos = rows.reverse().map(row => ({
    id: row.id,
    name: row.name,
    category: row.category,
    size: row.size,
    mediaType: row.mediaType || 'video',
    url: URL.createObjectURL(row.blob),
    coverUrl: row.coverBlob ? URL.createObjectURL(row.coverBlob) : null
  }));
  if(videos.length) idCounter = Math.max(...videos.map(v=>v.id));
  render();
}

// ── FILE IMPORT ──
document.getElementById('fileInput').addEventListener('change', function(e){
  const files = Array.from(e.target.files).filter(f => f.type.startsWith('video/') || f.type.startsWith('audio/'));
  if(!files.length){ showToast('❌ Aucun fichier vidéo sélectionné'); return; }
  catQueue = files;
  catQueueIdx = 0;
  nextCatPick();
  this.value = '';
});

let pendingCat = null;   // catégorie choisie en attente de la cover
let pendingCover = null; // blob cover en attente

function nextCatPick(){
  if(catQueueIdx >= catQueue.length){
    render();
    showToast(`✅ ${catQueue.length} fichier${catQueue.length>1?'s':''} sauvegardé${catQueue.length>1?'s':''} !`);
    catQueue=[]; pendingCat=null; pendingCover=null;
    return;
  }
  const f = catQueue[catQueueIdx];
  document.getElementById('catModalSub').textContent = `"${cleanName(f.name)}"`;
  document.getElementById('catCustomInput').value = '';
  document.getElementById('catModal').classList.add('open');
}

function setCat(cat){
  pendingCat = cat;
  document.getElementById('catModal').classList.remove('open');
  // Passer à l'étape cover
  setTimeout(() => openCoverModal(), 80);
}

function setCatCustom(){
  const v = document.getElementById('catCustomInput').value.trim();
  setCat(v || 'Autre');
}

document.getElementById('catCustomInput').addEventListener('keydown', e => { if(e.key==='Enter') setCatCustom(); });

// ── COVER FLOW ──
function openCoverModal(){
  const f = catQueue[catQueueIdx];
  pendingCover = null;
  document.getElementById('coverModalSub').textContent = `"${cleanName(f.name)}"`;
  document.getElementById('coverPreviewWrap').style.display = 'none';
  document.getElementById('coverModal').classList.add('open');
}

function pickCoverImage(){
  document.getElementById('coverInput').click();
}

document.getElementById('coverInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  pendingCover = file;
  const url = URL.createObjectURL(file);
  const img = document.getElementById('coverPreview');
  img.src = url;
  document.getElementById('coverPreviewWrap').style.display = 'block';
  this.value = '';
});

function confirmCover(){
  document.getElementById('coverModal').classList.remove('open');
  proceedAdd();
}

function skipCover(){
  pendingCover = null;
  document.getElementById('coverModal').classList.remove('open');
  proceedAdd();
}

function proceedAdd(){
  const f = catQueue[catQueueIdx];
  catQueueIdx++;
  addVideo(f, pendingCat, pendingCover).then(() => setTimeout(nextCatPick, 80));
}

async function addVideo(file, category, coverFile=null){
  const blob = file;
  const mediaType = file.type.startsWith('audio/') ? 'audio' : 'video';
  // Lire le cover comme ArrayBuffer pour le stocker en IndexedDB
  let coverBlob = null;
  if(coverFile) coverBlob = coverFile;
  const record = {
    name: cleanName(file.name),
    category,
    size: file.size,
    mediaType,
    blob,
    coverBlob
  };
  const id = await dbAdd(record);
  const url = URL.createObjectURL(blob);
  const coverUrl = coverBlob ? URL.createObjectURL(coverBlob) : null;
  videos.unshift({ id, name: record.name, category, size: file.size, mediaType, url, coverUrl });
  idCounter = Math.max(idCounter, id);
}

async function deleteVideo(id){
  await dbDelete(id);
  const v = videos.find(x=>x.id===id);
  if(v && v.url) URL.revokeObjectURL(v.url);
  if(v && v.coverUrl) URL.revokeObjectURL(v.coverUrl);
  videos = videos.filter(x=>x.id!==id);
  if(currentId===id) closePlayer();
  render();
  showToast('🗑️ Vidéo supprimée');
}

function isAudio(v){ return v.mediaType === 'audio'; }

function cleanName(n){
  return n.replace(/\.[^/.]+$/, '').replace(/[_\-\.]/g,' ').replace(/\s+/g,' ').trim();
}

function fmtSize(b){
  if(b>1e9) return (b/1e9).toFixed(1)+' Go';
  if(b>1e6) return (b/1e6).toFixed(0)+' Mo';
  return (b/1e3).toFixed(0)+' Ko';
}

// ── RENDER ──
function render(){
  renderHero();
  renderAll();
  renderCats();
  document.getElementById('allCount').textContent = videos.length;
  const q = document.getElementById('searchInput').value;
  if(q) handleSearch(q);
  setTimeout(() => {
    document.querySelectorAll('.video-card').forEach(c => thumbObserver.observe(c));
  }, 100);
}

function renderHero(){
  const hc = document.getElementById('heroContent');
  const h  = document.getElementById('hero');
  if(!videos.length){
    h.style.backgroundImage = '';
    hc.innerHTML = `<div class="hero-empty"><div style="font-size:64px">🎬</div><h2>AUCUNE VIDÉO</h2><p>Clique sur <strong style="color:var(--red)">Importer</strong> pour ajouter tes vidéos depuis ton appareil</p></div>`;
    return;
  }
  const v = videos[0];
  h.style.backgroundImage = '';
  if(v.coverUrl){
    h.style.backgroundImage = `url(${v.coverUrl})`;
  } else if(!isAudio(v)){
    generateThumb(v.url).then(img => {
      if(img) h.style.backgroundImage = `url(${img})`;
    });
  }
  hc.innerHTML = `
    <div class="hero-badge">★ À la une</div>
    <div class="hero-title">${v.name}</div>
    <div class="hero-actions">
      <button class="btn-play" onclick="playVideo(${v.id})">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>Lire
      </button>
    </div>`;
}

function renderAll(){
  const g = document.getElementById('allGrid');
  g.innerHTML = videos.length
    ? videos.map(v => cardHTML(v)).join('')
    : `<div class="empty-state"><div class="icon">📽️</div><h3>AUCUNE VIDÉO</h3><p>Importe tes vidéos avec le bouton en haut à droite</p></div>`;
}

function renderCats(){
  const cats = [...new Set(videos.map(v => v.category).filter(Boolean))];
  document.getElementById('categoriesContainer').innerHTML = cats.map(cat => {
    const vids = videos.filter(v => v.category === cat);
    if(vids.length < 2) return '';
    return `<div class="section" style="margin-top:40px">
      <div class="section-header"><span class="section-title">${cat.toUpperCase()}</span><span class="section-count">${vids.length}</span></div>
      <div class="video-grid">${vids.map(v => cardHTML(v)).join('')}</div>
    </div>`;
  }).join('');
}

function cardHTML(v){
  return `<div class="video-card" onclick="playVideo(${v.id})">
    <div class="thumb-wrap${isAudio(v)?' is-audio':''}">
      <span class="thumb-icon">${isAudio(v)?'🎵':'▶'}</span>
      ${v.coverUrl
        ? `<img src="${v.coverUrl}" style="width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0" alt="">`
        : !isAudio(v) ? `<canvas id="canvas-${v.id}" style="width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;opacity:0;transition:opacity .3s" width="320" height="180"></canvas>` : ''}
      <div class="video-overlay"><div class="play-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div>
    </div>
    <button class="card-del-btn" onclick="event.stopPropagation();deleteVideo(${v.id})" title="Supprimer">🗑️</button>
    <div class="video-info">
      <div class="video-title">${v.name}</div>
      <div class="video-meta">
        <span class="video-cat">${v.category||'Autre'}</span>
        ${isAudio(v)?'<span class="badge-mp3">MP3</span>':''}
        <span class="video-size">${fmtSize(v.size)}</span>
      </div>
    </div>
  </div>`;
}

// ── THUMBNAIL GENERATION ──
const thumbCache = {};
function generateThumb(url, time=3){
  if(thumbCache[url]) return Promise.resolve(thumbCache[url]);
  return new Promise(resolve => {
    const vid = document.createElement('video');
    vid.src = url; vid.muted = true; vid.preload = 'metadata';
    vid.currentTime = time;
    vid.addEventListener('seeked', () => {
      try{
        const c = document.createElement('canvas');
        c.width=320; c.height=180;
        c.getContext('2d').drawImage(vid,0,0,320,180);
        const d = c.toDataURL('image/jpeg',.7);
        thumbCache[url] = d;
        resolve(d);
      }catch{ resolve(null); }
    }, {once:true});
    vid.addEventListener('error', () => resolve(null), {once:true});
  });
}

function loadCardThumbs(){
  videos.forEach(v => {
    const canvas = document.getElementById(`canvas-${v.id}`);
    if(!canvas) return;
    generateThumb(v.url).then(img => {
      if(!img) return;
      const ctx = canvas.getContext('2d');
      const image = new Image();
      image.onload = () => { ctx.drawImage(image,0,0,320,180); canvas.style.opacity='1'; };
      image.src = img;
    });
  });
}

// ── PLAYER ──
const vid = document.getElementById('mainVideo');

function playVideo(id, queue=null){
  const v = videos.find(x => x.id === id);
  if(!v) return;
  if(queue){ playQueue=queue; playIdx=queue.indexOf(id); }
  else{ playQueue=videos.map(x=>x.id); playIdx=playQueue.indexOf(id); }
  currentId = id;
  cancelAnt();
  vid.src = v.url;
  vid.load();
  vid.play().catch(()=>{});
  document.getElementById('playerTitle').textContent = v.name;
  document.getElementById('playerSub').textContent = (isAudio(v)?'🎵 Audio':'🎬 Vidéo') + ' · ' + v.category + ' · ' + fmtSize(v.size);
  // Mode audio : afficher cover art + cacher l'aspect ratio vidéo
  const pw = document.querySelector('.player-wrap');
  if(isAudio(v)){
    pw.style.aspectRatio = 'unset';
    pw.style.minHeight = '220px';
    pw.style.background = 'linear-gradient(135deg,#0d1a2e,#1a0820)';
    vid.style.display = 'none';
    let audioCover = document.getElementById('audioCover');
    const diskHtml = v.coverUrl
      ? `<img src="${v.coverUrl}" id="audioDisk" style="width:120px;height:120px;border-radius:12px;object-fit:cover;box-shadow:0 8px 32px rgba(0,0,0,.6)">`
      : `<div id="audioDisk" style="width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--blue));display:flex;align-items:center;justify-content:center;font-size:38px;animation:spin 6s linear infinite">🎵</div>`;
    if(!audioCover){
      audioCover = document.createElement('div');
      audioCover.id = 'audioCover';
      audioCover.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;width:100%';
      audioCover.innerHTML = diskHtml + `<div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;text-align:center">${v.name}</div>`;
      pw.appendChild(audioCover);
    } else {
      audioCover.style.display = 'flex';
      audioCover.innerHTML = diskHtml + `<div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;text-align:center">${v.name}</div>`;
    }
  } else {
    pw.style.aspectRatio = '16/9';
    pw.style.minHeight = '';
    pw.style.background = '#000';
    vid.style.display = 'block';
    const audioCover = document.getElementById('audioCover');
    if(audioCover) audioCover.style.display = 'none';
  }
  updNavBtns();
  document.getElementById('playerModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

vid.addEventListener('ended', () => {
  if(!autoNext || playIdx >= playQueue.length-1){ cancelAnt(); return; }
  triggerAutoNext();
});

vid.addEventListener('error', () => {
  showToast('❌ Impossible de lire ce fichier');
});

function triggerAutoNext(){
  if(playIdx >= playQueue.length-1){ cancelAnt(); return; }
  showAntOverlay();
}

function showAntOverlay(){
  const next = videos.find(x => x.id === playQueue[playIdx+1]);
  if(!next) return;
  const o = document.getElementById('antOverlay');
  const p = document.getElementById('antProg');
  document.getElementById('antTxt').textContent = `Suivant : ${next.name}`;
  o.classList.add('show');
  o.style.display='block';
  p.style.transition = 'none'; p.style.width = '0';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    p.style.transition = 'width 5s linear';
    p.style.width = '100%';
  }));
  antTimer = setTimeout(() => playNext(), 5100);
}

function cancelAnt(){
  clearTimeout(antTimer); antTimer = null;
  const o = document.getElementById('antOverlay');
  if(o){ o.classList.remove('show'); const p=document.getElementById('antProg'); if(p){p.style.transition='none';p.style.width='0';} }
}

function playNext(){
  if(playIdx < playQueue.length-1){ playIdx++; playVideo(playQueue[playIdx], playQueue); }
}
function playPrev(){
  if(playIdx > 0){ playIdx--; playVideo(playQueue[playIdx], playQueue); }
}

function updNavBtns(){
  document.getElementById('prevBtn').disabled = playIdx <= 0;
  document.getElementById('nextBtn').disabled = playIdx >= playQueue.length-1;
}

function closePlayer(){
  cancelAnt();
  vid.pause(); vid.src = '';
  document.getElementById('playerModal').classList.remove('open');
  document.body.style.overflow = '';
  currentId = null;
}

function toggleAutoNext(){
  autoNext = !autoNext;
  document.getElementById('antToggle').classList.toggle('on', autoNext);
  if(!autoNext) cancelAnt();
  showToast(autoNext ? '🔁 Lecture auto activée' : '⏹ Lecture auto désactivée');
}

// ── SEARCH ──
function handleSearch(q){
  const ss = document.getElementById('search-section');
  const as = document.getElementById('all-section');
  const cc = document.getElementById('categoriesContainer');
  if(!q.trim()){ ss.classList.remove('visible'); as.style.display=''; cc.style.display=''; return; }
  const r = videos.filter(v => v.name.toLowerCase().includes(q.toLowerCase()) || (v.category||'').toLowerCase().includes(q.toLowerCase()));
  document.getElementById('searchTitle').textContent = `"${q.toUpperCase()}"`;
  document.getElementById('searchCount').textContent = r.length;
  document.getElementById('searchGrid').innerHTML = r.length
    ? r.map(v => cardHTML(v)).join('')
    : `<div class="empty-state"><div class="icon">🔍</div><h3>AUCUN RÉSULTAT</h3><p>Aucune vidéo ne correspond à "${q}"</p></div>`;
  ss.classList.add('visible'); as.style.display='none'; cc.style.display='none';
  setTimeout(loadCardThumbs, 100);
}

// ── TOAST ──
function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }

// ── ONLINE / OFFLINE ──
window.addEventListener('offline', () => document.getElementById('offlineBadge').classList.add('show'));
window.addEventListener('online',  () => document.getElementById('offlineBadge').classList.remove('show'));
if(!navigator.onLine) document.getElementById('offlineBadge').classList.add('show');

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if(e.key==='Escape') closePlayer();
  if(e.key==='ArrowRight' && currentId) playNext();
  if(e.key==='ArrowLeft' && currentId) playPrev();
  if(e.key===' ' && currentId){ e.preventDefault(); vid.paused ? vid.play() : vid.pause(); }
});

document.getElementById('playerModal').addEventListener('click', e => {
  if(e.target === e.currentTarget) closePlayer();
});

// Observer pour charger les miniatures quand les cartes sont visibles
const thumbObserver = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      const card = entry.target;
      const idMatch = card.querySelector('canvas[id^="canvas-"]');
      if(idMatch){
        const vid_id = parseInt(idMatch.id.replace('canvas-',''));
        const v = videos.find(x => x.id === vid_id);
        if(v && !isAudio(v) && !v.coverUrl){
          generateThumb(v.url).then(img => {
            if(!img) return;
            const ctx = idMatch.getContext('2d');
            const image = new Image();
            image.onload = () => { ctx.drawImage(image,0,0,320,180); idMatch.style.opacity='1'; };
            image.src = img;
          });
          thumbObserver.unobserve(card);
        }
      }
    }
  });
}, {rootMargin:'100px'});

// Miniatures chargées via IntersectionObserver dans render()

// ── SERVICE WORKER (offline) ──
if('serviceWorker' in navigator){
  // Inline SW en blob pour éviter le besoin d'un fichier externe
  const swCode = `
const CACHE = 'sharkflix-v1';
const ASSETS = [location.href];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if(e.request.method !== 'GET') return;
  e.respondWith(
    caches.match(e.request).then(cached => {
      if(cached) return cached;
      return fetch(e.request).then(resp => {
        if(resp && resp.status===200 && resp.type==='basic'){
          const clone = resp.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return resp;
      }).catch(() => cached);
    })
  );
});
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope:'/'}).catch(()=>{
    // Fallback: essai sans scope (certains navigateurs mobiles)
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  });
}

// Manifest PWA dynamique
const manifest = {
  name:'SHARKFLIX',
  short_name:'SHARKFLIX',
  start_url: location.href,
  display:'standalone',
  background_color:'#080810',
  theme_color:'#080810',
  icons:[{src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23080810" rx="20"/><text y=".9em" font-size="80" x="10">🦈</text></svg>',sizes:'any',type:'image/svg+xml'}]
};
const mBlob = new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
document.getElementById('manifestLink').href = URL.createObjectURL(mBlob);

// ── INIT ──
initDB().then(() => loadFromDB()).catch(e => {
  console.error('DB error:', e);
  render();
});
</script>
